{% extends 'gestion/base.html' %}
{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h2>🗑️ Eliminar Libro</h2>
        <div class="alert alert-danger mt-3">
            ¿Seguro que quieres eliminar el libro <strong>{{ object.titulo }}</strong>?
            <br><small>Esta acción no se puede deshacer.</small>
        </div>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
            <a href="{% url 'libro_list' %}" class="btn btn-secondary ms-2">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
