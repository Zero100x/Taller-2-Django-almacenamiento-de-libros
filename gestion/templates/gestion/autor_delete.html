{% extends 'gestion/base.html' %}
{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h2>🗑️ Eliminar Autor</h2>
        <div class="alert alert-danger mt-3">
            ¿Seguro que quieres eliminar a <strong>{{ object.nombre }}</strong>?
            <br><small>⚠️ También se eliminarán todos sus libros.</small>
        </div>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
            <a href="{% url 'autor_list' %}" class="btn btn-secondary ms-2">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
